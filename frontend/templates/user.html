<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Settings - NeutArr</title>
    {% include 'components/head.html' %}
    <style>
        .user-section {
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Desktop layout for cards side by side with intelligent wrapping */
        @media (min-width: 992px) {
            .user-section {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
            }
            
            .user-card {
                flex: 1 1 250px; /* Base width, but allow growth and shrinking */
            }
        }
        
        /* Medium displays - show just two cards side by side */
        @media (min-width: 992px) and (max-width: 1200px) {
            .user-section .user-card:nth-child(3) {
                flex-basis: 100%; /* Third card takes full width */
            }
        }
        
        /* Ensure main content area is scrollable */
        .main-content {
            overflow-y: auto;
            max-height: 100vh;
        }
        
        .user-card {
            background: linear-gradient(180deg, rgba(22, 26, 34, 0.98), rgba(18, 22, 30, 0.95));
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            padding: 18px;
            border: 1px solid rgba(90, 109, 137, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Add bottom margin only when cards are stacked (mobile view) */
        @media (max-width: 991px) {
            .user-card {
                margin-bottom: 15px;
            }
        }
        
        .user-card h3 {
            display: flex;
            align-items: center;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .user-card h3 i {
            margin-right: 8px;
            color: rgba(99, 102, 241, 0.9);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 8px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 13px;
        }
        
        .current-value {
            padding: 8px 10px;
            background: rgba(28, 36, 54, 0.6);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(90, 109, 137, 0.2);
            font-size: 14px;
        }
        
        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(90, 109, 137, 0.2);
            border-radius: 6px;
            background-color: rgba(28, 36, 54, 0.6);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
            outline: none;
        }
        
        .password-field {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            font-size: 12px;
        }
        
        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .form-actions {
            margin-top: 10px;
            display: flex;
            gap: 7px;
        }
        
        .action-button {
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            border: none;
        }
        
        .primary-button {
            background: linear-gradient(135deg, #6366F1 0%, #7577f3 100%);
            color: white;
            box-shadow: 0 3px 8px rgba(99, 102, 241, 0.3);
        }

        .primary-button:hover {
            background: linear-gradient(135deg, #7577f3 0%, #818CF8 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
        }
        
        .secondary-button {
            background: linear-gradient(135deg, #38495a 0%, #465b70 100%);
            color: white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }
        
        .secondary-button:hover {
            background: linear-gradient(135deg, #465b70 0%, #546d84 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }
        
        .danger-button {
            background: linear-gradient(135deg, #e74c3c 0%, #f15846 100%);
            color: white;
            box-shadow: 0 3px 8px rgba(231, 76, 60, 0.3);
        }
        
        .danger-button:hover {
            background: linear-gradient(135deg, #f15846 0%, #f3695a 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
        }
        
        .status-message {
            margin-top: 12px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .status-message.success {
            background-color: rgba(40, 167, 69, 0.2);
            color: #2ecc71;
            border-left: 3px solid #28a745;
        }
        
        .status-message.error {
            background-color: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border-left: 3px solid #dc3545;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 12px;
        }
        
        .status-badge.enabled {
            background-color: rgba(40, 167, 69, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(40, 167, 69, 0.4);
        }
        
        .status-badge.disabled {
            background-color: rgba(108, 117, 125, 0.2);
            color: #adb5bd;
            border: 1px solid rgba(108, 117, 125, 0.4);
        }
        
        .secret-key-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .secret-key-container .form-control {
            font-family: monospace;
            font-size: 13px;
        }

        .api-key-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
            margin: 6px 0 0;
            line-height: 1.5;
        }

        .api-key-hint code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 4px;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .user-card {
                padding: 15px;
            }

            .form-actions {
                flex-direction: column;
            }

            .action-button {
                width: 100%;
                justify-content: center;
            }

            .secret-key-container {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-button {
                margin-top: 7px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container mobile-optimized">
        {% include 'components/sidebar.html' %}
        
        <div class="main-content">
            {% include 'components/topbar.html' %}
            
            <div class="user-section">
                <div class="user-card">
                    <h3><i class="fas fa-user-edit"></i> Change Username</h3>
                    <div class="form-group">
                        <label for="currentUsername">Current Username:</label>
                        <span id="currentUsername" class="current-value">Loading...</span>
                    </div>
                    <div class="form-group">
                        <label for="newUsername">New Username:</label>
                        <input type="text" id="newUsername" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="currentPasswordForUsernameChange">Current Password:</label>
                        <input type="password" id="currentPasswordForUsernameChange" class="form-control" required>
                    </div>
                    <div class="form-actions">
                        <button id="saveUsername" class="action-button primary-button">Save Username</button>
                    </div>
                    <div id="usernameStatus" class="status-message" style="display: none;"></div>
                </div>
                
                <div class="user-card">
                    <h3><i class="fas fa-key"></i> Change Password</h3>
                    <div class="form-group">
                        <label for="currentPassword">Current Password:</label>
                        <input type="password" id="currentPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password:</label>
                        <input type="password" id="newPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password:</label>
                        <input type="password" id="confirmPassword" class="form-control">
                    </div>
                    <div class="form-actions">
                        <button id="savePassword" class="action-button primary-button">Save Password</button>
                    </div>
                    <div id="passwordStatus" class="status-message" style="display: none;"></div>
                </div>

                <div class="user-card">
                    <h3><i class="fas fa-plug"></i> API Access</h3>
                    <div class="form-group">
                        <label>API Key:</label>
                        <div class="secret-key-container">
                            <input type="password" id="apiKeyDisplay" class="form-control" readonly placeholder="Loading...">
                            <button id="toggleApiKey" class="action-button secondary-button" style="white-space: nowrap;">
                                <i class="fas fa-eye"></i> Show
                            </button>
                        </div>
                        <p class="api-key-hint">
                            Send as <code>X-Api-Key</code> header or <code>?apikey=</code> query param.
                        </p>
                    </div>
                    <div class="form-actions">
                        <button id="copyApiKey" class="action-button secondary-button">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                        <button id="rotateApiKey" class="action-button danger-button">
                            <i class="fas fa-sync-alt"></i> Rotate Key
                        </button>
                    </div>
                    <div id="apiKeyStatus" class="status-message" style="display: none;"></div>
                </div>

            </div>
        </div>
    </div>

    {% include 'components/scripts.html' %}
    <!-- Add specific reference to new-user.js -->
    <script src="/static/js/new-user.js"></script>
    <script>
        // Initialize dark mode
        document.addEventListener('DOMContentLoaded', function() {
            // Apply dark theme
            document.body.classList.add('dark-theme');
            localStorage.setItem('neutarr-dark-mode', 'true');
            
            // Update server setting to dark mode
            fetch('/api/settings/theme', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ dark_mode: true })
            }).catch(error => console.error('Error saving theme:', error));
        });
        
        // Password validation function
        function validatePassword(password) {
            // Only check for minimum length of 8 characters
            if (password.length < 8) {
                return 'Password must be at least 8 characters long.';
            }
            return null; // Password is valid
        }
    </script>
</body>
</html>
