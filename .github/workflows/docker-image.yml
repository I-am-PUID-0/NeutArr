name: Docker Image

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    paths-ignore:
      - "**.md"
      - ".github/**"

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(main): release '))    
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      dev_version: ${{ steps.dev_version.outputs.dev_version }}
      repo_owner_lower: ${{ steps.repo_lower.outputs.repo_owner_lower }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
      is_release: ${{ steps.release_check.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d '"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Get branch name
        id: branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "branch_name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Branch: ${BRANCH}"

      - name: Lowercase repo owner
        id: repo_lower
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner_lower=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Compute dev version
        id: dev_version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Count commits since last release tag (falls back to total count if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            DEV_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          else
            DEV_COUNT=$(git rev-list HEAD --count)
          fi
          DEV_VERSION="${VERSION}-dev.${DEV_COUNT}"
          echo "dev_version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Dev version: ${DEV_VERSION}"

      - name: Check if this is a release build
        id: release_check
        run: |
          IS_RELEASE="false"
          # Release builds trigger when a release-please PR is merged to main
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.event.pull_request.merged }}" == "true" && \
                "${{ github.event.pull_request.title }}" == chore\(main\):\ release* ]]; then
            IS_RELEASE="true"
          fi
          # Also allow manual dispatch with release intent
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                "${{ github.ref_name }}" == "main" ]]; then
            IS_RELEASE="true"
          fi
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Is release: ${IS_RELEASE}"

  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine image tags
        id: tags
        env:
          OWNER: ${{ needs.setup.outputs.repo_owner_lower }}
          VERSION: ${{ needs.setup.outputs.version }}
          DEV_VERSION: ${{ needs.setup.outputs.dev_version }}
          IS_RELEASE: ${{ needs.setup.outputs.is_release }}
          BRANCH: ${{ needs.setup.outputs.branch_name }}
        run: |
          IMAGE="iampuid0/neutarr"
          if [[ "$IS_RELEASE" == "true" ]]; then
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          elif [[ "$BRANCH" == "dev" ]]; then
            TAGS="${IMAGE}:dev,${IMAGE}:${DEV_VERSION}"
          else
            # Any other branch → branch-name tag only
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')
            TAGS="${IMAGE}:${SAFE_BRANCH}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Image tags: ${TAGS}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            NEUTARR_VERSION=${{ needs.setup.outputs.is_release == 'true' && needs.setup.outputs.version || needs.setup.outputs.dev_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Job summary
        run: |
          echo "## Docker Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ needs.setup.outputs.branch_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.setup.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dev version | \`${{ needs.setup.outputs.dev_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Is release | \`${{ needs.setup.outputs.is_release }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | \`${{ steps.tags.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | \`linux/amd64, linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.is_release == 'true'
    permissions:
      contents: write
    outputs:
      release_exists: ${{ steps.check_release.outputs.release_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if Release Exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release already exists for version $VERSION"
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release does not exist for version $VERSION"
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        if: steps.check_release.outputs.release_exists == 'false'
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d' | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # Multi-line output — use delimiter
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_release.outputs.release_exists == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.setup.outputs.version }}',
              name: '${{ needs.setup.outputs.version }}',
              body: `${{ steps.changelog.outputs.notes }}`,
              draft: false,
              prerelease: false,
            });
            console.log(`Created release: ${release.html_url}`);
            core.summary.addRaw(`## Release Created\n[${release.name}](${release.html_url})`);
            await core.summary.write();

      - name: Add Job Summary for Release
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Version:** \`${{ needs.setup.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release Status:** ${{ steps.check_release.outputs.release_exists == 'false' && 'Created' || 'Skipped (Already Exists)' }}" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  announce:
    needs: [create-release, build-and-push, setup]
    if: needs.setup.outputs.is_release == 'true' && needs.create-release.outputs.release_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Post announcement to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          RELEASE_NOTES=$(sed -n '/^## \[[0-9]\+\.[0-9]\+\.[0-9]\+\](/,$p' CHANGELOG.md | sed -n '1!{/^## \[/q;p}')
          ANNOUNCEMENT_BODY="🚀 **New NeutArr Release: Version ${{ env.VERSION }}**${RELEASE_NOTES}"
          ESCAPED_BODY=$(echo "$ANNOUNCEMENT_BODY" | jq -Rsa .)
          curl -H "Content-Type: application/json" \
               -d "{\"content\": $ESCAPED_BODY, \"flags\": 4}" \
               "$DISCORD_WEBHOOK_URL"

  # ─────────────────────────────────────────────────────────────────────────────
  announce-dev:
    needs: [build-and-push, setup]
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Post dev announcement to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.setup.outputs.version }}
          DEV_VERSION: ${{ needs.setup.outputs.dev_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          DEV_TAG="dev-build"
          BASE_LABEL="Changes since last dev build"

          if git rev-parse -q --verify "refs/tags/${DEV_TAG}" >/dev/null; then
            RANGE="${DEV_TAG}..HEAD"
          else
            BASE_LABEL=""
            if LAST_TAG=$(gh release view --json tagName -q .tagName --repo "${{ github.repository }}" 2>/dev/null); then
              RANGE="${LAST_TAG}..HEAD"
              BASE_LABEL="Changes since Release ${LAST_TAG}"
            else
              RANGE=""
              BASE_LABEL="Changes since initial commit"
            fi
          fi

          COMMITS=$(git log ${RANGE} --pretty=format:"- %s ([%h](https://github.com/${REPO}/commit/%H))")
          if [[ -z "${COMMITS}" ]]; then
            COMMITS="- (no new commits since last release)"
          fi

          export COMMITS BASE_LABEL
          ANNOUNCEMENT_BODY="$(python -c 'import os; version=os.environ.get("DEV_VERSION") or os.environ.get("VERSION","dev"); commits=os.environ.get("COMMITS","").strip(); base=os.environ.get("BASE_LABEL","").strip(); header=f"🛠️ **NeutArr Dev Build** (version \`{version}\`)\n"; label=(f"{base}\n" if base else ""); body=header+label+commits; max_len=1900; print(body[:max_len-3].rstrip()+"..." if len(body)>max_len else body)')"

          ESCAPED_BODY=$(echo "$ANNOUNCEMENT_BODY" | jq -Rsa .)
          curl -H "Content-Type: application/json" \
               -d "{\"content\": $ESCAPED_BODY, \"flags\": 4}" \
               "$DISCORD_WEBHOOK_URL"

      - name: Update dev build tag
        if: success()
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-build
          git push -f origin dev-build

# ─────────────────────────────────────────────────────────────────────────────

  update-pr-label:
    needs: create-release
    if: needs.create-release.outputs.release_exists == 'false' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "Remove 'autorelease: pending' label from all merged PRs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBERS=$(gh pr list --state merged --base main --json number,labels --jq '[.[] | select(.labels[].name == "autorelease: pending") | .number] | @sh')
          
          if [[ -n "$PR_NUMBERS" ]]; then
            for PR_NUMBER in $PR_NUMBERS; do
              PR_NUMBER=$(echo $PR_NUMBER | tr -d "'") # Remove quotes from jq output
              echo "Updating PR #$PR_NUMBER..."
              gh pr edit $PR_NUMBER --remove-label "autorelease: pending"
              gh pr edit $PR_NUMBER --add-label "autorelease: tagged"
              echo "Updated PR #$PR_NUMBER with 'autorelease: tagged'"
            done
          else
            echo "No merged PRs found with 'autorelease: pending' label."
          fi
